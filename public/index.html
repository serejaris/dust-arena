<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DUST ARENA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  #c { display: block; width: 100%; height: 100%; cursor: none; }
  .hud { position: fixed; color: #e8e0c8; text-shadow: 0 1px 2px #000; user-select: none; pointer-events: none; }
  #crosshair { top: 50%; left: 50%; color: #7CFC00; font-size: 22px; font-weight: bold; transform: translate(-50%,-50%); }
  #hp { left: 24px; bottom: 20px; font-size: 28px; font-weight: bold; color: #7CFC00; }
  #ammo { right: 24px; bottom: 20px; font-size: 28px; font-weight: bold; }
  #timer { top: 14px; left: 50%; transform: translateX(-50%); font-size: 22px; font-weight: bold; }
  #killfeed { top: 14px; right: 18px; font-size: 14px; text-align: right; }
  #killfeed div { margin-bottom: 4px; background: rgba(0,0,0,.45); padding: 2px 8px; border-radius: 3px; }
  #msg { top: 38%; left: 50%; transform: translateX(-50%); font-size: 30px; font-weight: bold; color: #ffce54; text-align: center; }
  #dmgflash { inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,.45)); opacity: 0; transition: opacity .3s; }
  #healflash { inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(40,255,120,.35)); opacity: 0; transition: opacity .4s; }
  #deathveil { inset: 0; background: radial-gradient(ellipse at center, rgba(80,0,0,.25), rgba(60,0,0,.55)); opacity: 0; transition: opacity .5s; }
  #hitmark { top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(45deg); color: #ff5544; font-size: 30px; font-weight: bold; opacity: 0; }
  #ping { top: 14px; left: 18px; font-size: 13px; color: #8a8060; }
  #scoreboard { top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(10,10,5,.85); padding: 18px 28px; border: 1px solid #5a5238; min-width: 360px; display: none; font-size: 15px; }
  #scoreboard table { width: 100%; border-collapse: collapse; }
  #scoreboard td, #scoreboard th { padding: 4px 10px; text-align: left; }
  #scoreboard th { color: #ffce54; border-bottom: 1px solid #5a5238; }
  #join { position: fixed; inset: 0; background: linear-gradient(#2a2415, #0e0c06); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: auto; }
  #join .box { background: rgba(20,18,8,.92); border: 1px solid #6b5f33; padding: 36px 44px; text-align: center; color: #e8e0c8; max-width: calc(100vw - 24px); box-sizing: border-box; }
  #join input { max-width: 100%; }
  #join h1 { color: #ffce54; letter-spacing: 6px; margin-bottom: 6px; font-size: 34px; }
  #join p.sub { color: #8a8060; margin-bottom: 22px; font-size: 13px; letter-spacing: 2px; }
  #join input { display: block; width: 260px; margin: 10px auto; padding: 10px 12px; background: #0e0c06; border: 1px solid #6b5f33; color: #e8e0c8; font-family: inherit; font-size: 15px; }
  #join button { margin-top: 14px; padding: 12px 38px; background: #6b5f33; color: #14120a; border: 0; font-family: inherit; font-weight: bold; font-size: 16px; cursor: pointer; letter-spacing: 2px; }
  #join button:hover { background: #ffce54; }
  #join .hint { margin-top: 16px; font-size: 12px; color: #8a8060; line-height: 1.6; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="crosshair">+</div>
<div class="hud" id="hp">+100</div>
<div class="hud" id="ammo">30 / ∞</div>
<div class="hud" id="timer">1:00</div>
<div class="hud" id="killfeed"></div>
<div class="hud" id="msg"></div>
<div class="hud" id="dmgflash"></div>
<div class="hud" id="healflash"></div>
<div class="hud" id="deathveil"></div>
<div class="hud" id="hitmark">+</div>
<div class="hud" id="ping"></div>
<div class="hud" id="scoreboard"></div>
<div id="join">
  <div class="box">
    <h1>DUST ARENA</h1>
    <p class="sub">top-down team arena &middot; de_dust vibes</p>
    <input id="nick" maxlength="16" placeholder="nickname">
    <input id="room" maxlength="24" placeholder="room (default: dust)">
    <button id="go">ENTER →</button>
    <div class="hint">auto team-balanced &middot; frag the other color<br>WASD move &middot; MOUSE aim &middot; LMB shoot<br>SPACE jump &middot; R reload &middot; TAB scoreboard &middot; M mute<br>1-4 taunts (EZ / NICE SHOT / RUSH B / HELP!)</div>
  </div>
</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---------- scene ----------
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ec8e8);
// top-down telephoto camera (Brawl-Stars-like): narrow FOV compresses depth
const CAM = { fov: 17, dist: 120, tilt: 60 * Math.PI / 180, lerp: 8, lookAhead: 0.22, lookMax: 14 };
const camera = new THREE.PerspectiveCamera(CAM.fov, innerWidth / innerHeight, 1, 500);
const camOffY = CAM.dist * Math.sin(CAM.tilt);
const camOffZ = CAM.dist * Math.cos(CAM.tilt);
const camTarget = new THREE.Vector3(0, 0, 30);
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.HemisphereLight(0xfff4d6, 0x8a7a50, 0.9));
const sun = new THREE.DirectionalLight(0xffeecc, 1.2);
sun.position.set(40, 60, 20);
scene.add(sun);

// ---------- map (v3 top-down dust2 — generated by tools/gen_map.py) ----------
const SAND = 0xc9b074;
const worldMeshes = [];
const colliders = []; // {minX..maxZ}
function box(x, z, w, h, d, color, y = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color }));
  m.position.set(x, y + h / 2, z);
  scene.add(m); worldMeshes.push(m);
  if (h > 0.3) colliders.push({ minX: x - w/2, maxX: x + w/2, minY: y, maxY: y + h, minZ: z - d/2, maxZ: z + d/2 });
  return m;
}
{
  const f = new THREE.Mesh(new THREE.BoxGeometry(152, 1, 152), new THREE.MeshLambertMaterial({ color: SAND }));
  f.position.y = -0.5; scene.add(f); worldMeshes.push(f);
}
let MAP;
try {
  MAP = await fetch('map.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
} catch (e) {
  document.querySelector('#join .sub').textContent = 'FAILED TO LOAD MAP — REFRESH PAGE';
  throw e;
}
for (const b of MAP.boxes) box(b.x, b.z, b.w, b.h, b.d, b.c, b.y || 0);

// ---------- 2D shot occlusion (top-down: height never matters, only footprint) ----------
// Bullets travel on the XZ plane. A box blocks a shot iff it is chest-high cover/wall
// (h >= 1.2) AND it is not a walkable plateau (#c2a96a). Soft cover (h<1.2), stairs/marks
// and the elevation plateaus themselves stay transparent — so a player on the +1.5 T plateau
// and one on the ground hit each other freely. Same flat model as Brawl Stars.
const PLAT_COLOR = '#c2a96a';
const shotBlockers = MAP.boxes
  .filter(b => b.h >= 1.2 && b.c !== PLAT_COLOR)
  .map(b => ({ minX: b.x - b.w / 2, maxX: b.x + b.w / 2, minZ: b.z - b.d / 2, maxZ: b.z + b.d / 2 }));

// ---------- player physics ----------
const P = { r: 0.4, h: 1.8, speed: 7.2, walk: 3.4, jump: 7.5, grav: 21, chest: 1.2 };

// ---------- weapons (client mirror of server.js WEAPONS — id = index, 0 = rifle default) ----------
const WEAPONS = [
  { name: 'RIFLE',   mag: 30,  fireMs: 110,  range: 40, sndRate: 1.0,  sndVol: 0.25, spreadMul: 1.0, color: 0xffce54 },
  { name: 'SMG',     mag: 40,  fireMs: 70,   range: 30, sndRate: 1.25, sndVol: 0.18, spreadMul: 1.3, color: 0x4fd0e0 },
  { name: 'DEAGLE',  mag: 7,   fireMs: 350,  range: 36, sndRate: 0.8,  sndVol: 0.4,  spreadMul: 1.8, color: 0xd8d8d8 },
  { name: 'SHOTGUN', mag: 6,   fireMs: 650,  range: 14, sndRate: 0.55, sndVol: 0.5,  spreadMul: 2.2, color: 0xff8a3a },
  { name: 'AWP',     mag: 5,   fireMs: 1500, range: 62, sndRate: 0.45, sndVol: 0.55, spreadMul: 0.4, color: 0x7CFC00 },
  { name: 'LMG',     mag: 100, fireMs: 90,   range: 38, sndRate: 1.1,  sndVol: 0.3,  spreadMul: 1.4, color: 0xff5544 },
];
let myW = 0; const curW = () => WEAPONS[myW];
let curRange = WEAPONS[0].range; // hitscan range cap (Brawl-Stars rule: no cross-map shots) — varies by held weapon
const pos = new THREE.Vector3(0, 0, 30);
const vel = new THREE.Vector3();
let yaw = 0, onGround = false;
const keys = {};

function collide() {
  for (const c of colliders) {
    const px = pos.x, pz = pos.z, py = pos.y;
    if (px + P.r <= c.minX || px - P.r >= c.maxX || pz + P.r <= c.minZ || pz - P.r >= c.maxZ) continue;
    if (py >= c.maxY || py + P.h <= c.minY) {
      continue;
    }
    // landing on top
    if (vel.y <= 0 && py >= c.maxY - 0.6) { pos.y = c.maxY; vel.y = 0; onGround = true; continue; }
    // auto step-up (stairs, low ledges)
    if (c.maxY - py <= 0.55 && vel.y <= 0.01) { pos.y = c.maxY; onGround = true; continue; }
    // push out horizontally (smallest overlap)
    const ox1 = (px + P.r) - c.minX, ox2 = c.maxX - (px - P.r);
    const oz1 = (pz + P.r) - c.minZ, oz2 = c.maxZ - (pz - P.r);
    const m = Math.min(ox1, ox2, oz1, oz2);
    if (m === ox1) pos.x = c.minX - P.r; else if (m === ox2) pos.x = c.maxX + P.r;
    else if (m === oz1) pos.z = c.minZ - P.r; else pos.z = c.maxZ + P.r;
  }
  if (pos.y <= 0) { pos.y = 0; vel.y = 0; onGround = true; }
}

// ---------- soldier model (own + remotes share the builder) ----------
const labelCanvas = (text) => {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 48;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 30px Courier New'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
  ctx.strokeText(text, 128, 34); ctx.fillText(text, 128, 34);
  return cv;
};
const MAX_HP = 100;
const hpColor = (hp) => hp > 50 ? '#7CFC00' : hp > 25 ? '#ffce54' : '#ff5544';
const HPBAR_W = 128, HPBAR_H = 16;
const hpbarCanvas = () => { const cv = document.createElement('canvas'); cv.width = HPBAR_W; cv.height = HPBAR_H; return cv; };
function drawHpbar(cv, hp) {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, HPBAR_W, HPBAR_H);
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, HPBAR_W, HPBAR_H);
  const frac = Math.max(0, Math.min(MAX_HP, hp)) / MAX_HP;
  ctx.fillStyle = hpColor(hp); ctx.fillRect(1, 1, (HPBAR_W - 2) * frac, HPBAR_H - 2);
}
const HIP_Y = 0.7, BODY_Y = 0.85, GUN_Y = 1.2;
function soldierModel(color, pid) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.05, 0.4), new THREE.MeshLambertMaterial({ color }));
  body.position.y = BODY_Y;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.34, 0.34), new THREE.MeshLambertMaterial({ color: 0xd9b48f }));
  head.position.y = 1.55;
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.6), new THREE.MeshLambertMaterial({ color: 0x333028 }));
  gun.position.set(0.25, GUN_Y, -0.3);
  // legs hang from hip pivots so they can swing through a walk cycle
  const mkLeg = (x) => {
    const pivot = new THREE.Group(); pivot.position.set(x, HIP_Y, 0);
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.7, 0.34), new THREE.MeshLambertMaterial({ color: 0x4a4438 }));
    leg.position.y = -0.35; pivot.add(leg);
    return { pivot, leg };
  };
  const legL = mkLeg(-0.16), legR = mkLeg(0.16);
  g.add(body, head, gun, legL.pivot, legR.pivot);
  if (pid != null) for (const m of [body, head, legL.leg, legR.leg]) m.userData.pid = pid;
  g.userData.aimMeshes = [body, head, legL.leg, legR.leg];
  g.userData.anim = { body, gun, legL: legL.pivot, legR: legR.pivot, phase: 0 };
  return g;
}
// shared walk cycle: legs swing in antiphase, torso + gun bob on the down-beat
function animateWalk(anim, dt, moving) {
  if (!anim) return;
  if (moving) {
    anim.phase += dt * 11;
    const s = Math.sin(anim.phase);
    anim.legL.rotation.x = s * 0.7;
    anim.legR.rotation.x = -s * 0.7;
    const bob = Math.abs(Math.sin(anim.phase)) * 0.07;
    anim.body.position.y = BODY_Y + bob;
    anim.gun.position.y = GUN_Y + bob;
  } else {
    const k = Math.min(1, dt * 12);
    anim.legL.rotation.x *= 1 - k;
    anim.legR.rotation.x *= 1 - k;
    anim.body.position.y += (BODY_Y - anim.body.position.y) * k;
    anim.gun.position.y += (GUN_Y - anim.gun.position.y) * k;
  }
}
// snap legs/torso to neutral — dead bodies skip animateWalk, so reset on death & respawn
function resetAnim(anim) {
  if (!anim) return;
  anim.legL.rotation.x = 0; anim.legR.rotation.x = 0;
  anim.body.position.y = BODY_Y; anim.gun.position.y = GUN_Y; anim.phase = 0;
}

// own avatar (visible in top-down — you ARE on the screen now)
let me = null, myColor = '#d9a24b';
const myMuzzle = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), new THREE.MeshBasicMaterial({ color: 0xffd27a }));
myMuzzle.visible = false;
function buildMe() {
  if (me) scene.remove(me);
  me = soldierModel(myColor, null);
  me.add(myMuzzle);
  myMuzzle.position.set(0.25, 1.2, -0.75);
  scene.add(me);
}

// ---------- aim ring + aim line ----------
const ring = new THREE.Mesh(
  new THREE.RingGeometry(curRange - 0.5, curRange, 64).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0xffe9a0, transparent: true, opacity: 0.10, depthWrite: false })
);
ring.visible = false;
scene.add(ring);
// weapon switch changes the range, so the ring's radius must be rebuilt (geometry isn't resizable in place)
function rebuildRing() {
  ring.geometry.dispose();
  ring.geometry = new THREE.RingGeometry(curRange - 0.5, curRange, 64).rotateX(-Math.PI / 2);
}
const aimGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
const aimLine = new THREE.Line(aimGeo, new THREE.LineBasicMaterial({ color: 0xffe9a0, transparent: true, opacity: 0.3, depthWrite: false }));
aimLine.visible = false;
aimLine.frustumCulled = false; // geometry mutates every frame; stale bounding sphere would cull it
scene.add(aimLine);

// ---------- particles ----------
const parts = [];
const partGeo = new THREE.BoxGeometry(0.09, 0.09, 0.09);
function burst(p, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(partGeo, new THREE.MeshBasicMaterial({ color }));
    m.position.copy(p);
    scene.add(m);
    parts.push({
      m, life: 0.7,
      v: new THREE.Vector3((Math.random() - .5) * 6, Math.random() * 5 + 1, (Math.random() - .5) * 6),
    });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dt;
    p.v.y -= 14 * dt;
    p.m.position.addScaledVector(p.v, dt);
    if (p.m.position.y < 0.05) { p.m.position.y = 0.05; p.v.set(0, 0, 0); }
    if (p.life <= 0) { scene.remove(p.m); p.m.material.dispose(); parts.splice(i, 1); }
  }
}

// ---------- remote players ----------
const remotes = new Map(); // id -> {group, label, hpbar, hpCanvas, hpTex, buf:[], name, color, hp, dead, kills, deaths}
function makeRemote(p) {
  const g = soldierModel(p.color, p.id);
  const tex = new THREE.CanvasTexture(labelCanvas(p.name));
  const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  label.scale.set(2.2, 0.42, 1); label.position.y = 2.3;
  const hpCanvas = hpbarCanvas(); drawHpbar(hpCanvas, p.hp);
  const hpTex = new THREE.CanvasTexture(hpCanvas);
  const hpbar = new THREE.Sprite(new THREE.SpriteMaterial({ map: hpTex, depthTest: false }));
  hpbar.scale.set(2.0, 0.14, 1); hpbar.position.y = 2.05;
  g.add(label, hpbar);
  g.position.set(p.x, p.y, p.z);
  scene.add(g);
  remotes.set(p.id, { group: g, label, hpbar, hpCanvas, hpTex, buf: [], name: p.name, color: p.color, team: p.team || 0, aimMeshes: g.userData.aimMeshes, hp: p.hp, dead: p.dead, fall: p.dead ? 1 : 0, kills: p.kills || 0, deaths: p.deaths || 0 });
  if (p.dead) { g.rotation.x = Math.PI / 2; g.position.y = 0.2; }
}
function setRemoteHp(r, hp) {
  if (hp === r.hp) return;
  r.hp = hp;
  drawHpbar(r.hpCanvas, hp);
  r.hpTex.needsUpdate = true;
}
function disposeGroup(g) {
  g.traverse(c => { // legs now nest inside hip pivots — traverse, don't just walk children
    if (c.material) {
      if (c.material.map) c.material.map.dispose();
      c.material.dispose();
    }
    if (c.geometry) c.geometry.dispose();
  });
}
function removeRemote(id) {
  const r = remotes.get(id);
  if (r) { scene.remove(r.group); disposeGroup(r.group); remotes.delete(id); }
}
function killRemote(r) {
  r.dead = true; r.fall = 0; r.group.visible = true; r.label.visible = false; r.hpbar.visible = false;
  resetAnim(r.group.userData.anim); // corpse lies flat, not mid-stride
  burst(r.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), 0x991111);
}
function flinch(r) {
  r.group.traverse(c => { if (c.material && c.material.emissive) c.material.emissive.setHex(0x661111); });
  clearTimeout(r.flinchT);
  r.flinchT = setTimeout(() => {
    r.group.traverse(c => { if (c.material && c.material.emissive) c.material.emissive.setHex(0); });
  }, 90);
}
const TAUNTS = ['EZ', 'NICE SHOT', 'RUSH B', 'HELP!'];
let tauntCd = 0;
function taunt(n) {
  if (!ws || ws.readyState !== 1 || performance.now() < tauntCd || dead || frozen) return;
  tauntCd = performance.now() + 1500;
  ws.send(JSON.stringify({ t: 'chatping', n }));
  showMsg(TAUNTS[n], 1000);
}
function reviveRemote(r) {
  r.dead = false; r.fall = 0; r.buf = [];
  r.group.rotation.x = 0; r.group.position.y = 0;
  resetAnim(r.group.userData.anim);
  r.group.visible = true; r.label.visible = true; r.hpbar.visible = true;
}

// ---------- medkits ----------
const MEDKITS = MAP.medkits; // [x, z] — same source as server
const medkitMeshes = [];
function buildMedkits(states) {
  if (medkitMeshes.length) { // reconnect: just sync visibility
    states.forEach((s, i) => { if (medkitMeshes[i]) medkitMeshes[i].visible = s !== 0; });
    return;
  }
  MEDKITS.forEach(([x, z, y], i) => {
    const g = new THREE.Group();
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 0.9), new THREE.MeshLambertMaterial({ color: 0xf2f2f2 }));
    base.position.y = 0.55;
    const c1 = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.18, 0.2), new THREE.MeshLambertMaterial({ color: 0xd1342f }));
    const c2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.18, 0.62), new THREE.MeshLambertMaterial({ color: 0xd1342f }));
    c1.position.y = 0.84; c2.position.y = 0.84;
    g.add(base, c1, c2);
    g.position.set(x, y || 0, z);
    g.userData.baseY = y || 0;
    g.visible = states[i] !== 0;
    scene.add(g);
    medkitMeshes.push(g);
  });
}

// ---------- weapon spawns ----------
const WEAPON_SPAWNS = MAP.weaponSpawns || []; // [{x,z,w}] — same source as server
const weaponMeshes = [];
function buildWeaponSpawns(states) {
  if (weaponMeshes.length) { // reconnect: just sync visibility
    states.forEach((s, i) => { if (weaponMeshes[i]) weaponMeshes[i].visible = s !== 0; });
    return;
  }
  WEAPON_SPAWNS.forEach((s, i) => {
    const g = new THREE.Group();
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.7), new THREE.MeshLambertMaterial({ color: 0x3a3528 }));
    base.position.y = 0.5;
    const accent = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.16, 0.5), new THREE.MeshLambertMaterial({ color: WEAPONS[s.w].color }));
    accent.position.y = 0.78;
    g.add(base, accent);
    g.position.set(s.x, 0, s.z);
    g.userData.baseY = 0;
    g.visible = states[i] !== 0;
    scene.add(g);
    weaponMeshes.push(g);
  });
}

// ---------- audio ----------
const AC = new (window.AudioContext || window.webkitAudioContext)();
const master = AC.createGain();
master.connect(AC.destination);
let muted = false;
function toggleMute() {
  muted = !muted;
  master.gain.value = muted ? 0 : 1;
  showMsg(muted ? 'SOUND OFF' : 'SOUND ON', 900);
}
// ElevenLabs-generated SFX; procedural synthesis stays as fallback when a file is missing
const SFX = {};
const SFX_NAMES = ['shot', 'reload', 'step', 'hit', 'death', 'medkit', 'onfire', 'rampage', 'godlike', 'unstoppable', 'roundstart', 'roundover'];
for (const n of SFX_NAMES) {
  fetch('sfx/' + n + '.mp3')
    .then(r => r.ok ? r.arrayBuffer() : Promise.reject())
    .then(b => AC.decodeAudioData(b))
    .then(buf => SFX[n] = buf)
    .catch(() => {});
}
function play(name, vol = 1, pan = 0, rate = 1) {
  const buf = SFX[name];
  if (!buf) return false;
  const src = AC.createBufferSource();
  src.buffer = buf; src.playbackRate.value = rate;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(g);
  if (pan && AC.createStereoPanner) {
    const p = AC.createStereoPanner(); p.pan.value = pan;
    g.connect(p).connect(master);
  } else g.connect(master);
  src.start();
  return true;
}
function blip() {
  const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'square'; o.frequency.value = 1150;
  const g = AC.createGain(); g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
  o.connect(g).connect(master); o.start(); o.stop(t + 0.08);
}
function healSound() {
  const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(500, t); o.frequency.linearRampToValueAtTime(950, t + 0.18);
  const g = AC.createGain(); g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  o.connect(g).connect(master); o.start(); o.stop(t + 0.3);
}
function shotSound(vol = 0.25, pan = 0, rate = 1) {
  if (play('shot', Math.min(1, vol * 2.6), pan, (0.94 + Math.random() * 0.12) * rate)) return;
  const t = AC.currentTime;
  const buf = AC.createBuffer(1, 2205, 44100);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  src.connect(g);
  if (pan && AC.createStereoPanner) {
    const p = AC.createStereoPanner(); p.pan.value = pan;
    g.connect(p).connect(master);
  } else g.connect(master);
  src.start();
}

// ---------- net ----------
let ws = null, myId = 0, myTeam = 0, myHp = 100, myKills = 0, myDeaths = 0, dead = false;
let roundEndsAt = Date.now() + 60000, frozen = false, serverOffset = 0;
const teamName = t => t === 0 ? 'ORANGE' : 'BLUE';
const TEAM_HUD = ['#e6b85a', '#62a0e6']; // HUD tints matching server team colors
const $ = id => document.getElementById(id);
const sb = $('scoreboard');

const params = new URLSearchParams(location.search);
const SPECTATE = !!params.get('spectate'); // ?spectate=1 — overhead map view, no join
if (SPECTATE) {
  $('join').style.display = 'none';
  $('crosshair').style.display = 'none';
  document.getElementById('c').style.cursor = 'auto';
  camera.fov = 50; camera.updateProjectionMatrix();
  camera.position.set(0, 170, 0.1);
  camera.lookAt(0, 0, 0);
}
if (params.get('room')) $('room').value = params.get('room');
$('nick').value = localStorage.getItem('nick') || '';
$('go').onclick = join;
$('nick').addEventListener('keydown', e => e.key === 'Enter' && join());
$('room').addEventListener('keydown', e => e.key === 'Enter' && join());

let myNick = null, myRoom = null, reconnT = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => ws.send(JSON.stringify({ t: 'join', name: myNick, room: myRoom, spectate: SPECTATE || undefined }));
  ws.onmessage = (e) => onMsg(JSON.parse(e.data));
  ws.onclose = () => { // auto-reconnect with same nick/room; 'init' rebuilds state
    if (!SPECTATE) showMsg('CONNECTION LOST — reconnecting…', 999999);
    clearTimeout(reconnT);
    reconnT = setTimeout(connect, 1500);
  };
}
if (SPECTATE) { // live overhead view: joins as socket-only spectator
  myNick = 'spectator';
  myRoom = (params.get('room') || 'dust').replace(/[^\w-]/g, '') || 'dust';
  connect();
}
function join() {
  if (ws) return; // Space on a focused button must not re-join
  $('go').blur();
  myNick = $('nick').value.trim() || 'player' + Math.floor(Math.random() * 99);
  myRoom = ($('room').value.trim() || 'dust').replace(/[^\w-]/g, '') || 'dust';
  localStorage.setItem('nick', myNick);
  history.replaceState(null, '', '?room=' + myRoom);
  connect();
  setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ t: 'ping', ts: performance.now() })); }, 2000);
  $('join').style.display = 'none';
  AC.resume();
}

function snapCamera() {
  camTarget.set(pos.x, pos.y, pos.z);
  aimPoint.set(pos.x, pos.y, pos.z - 6);
}

function onMsg(m) {
  switch (m.t) {
    case 'init':
      for (const id of [...remotes.keys()]) removeRemote(id); // clean slate (reconnect)
      dead = false; frozen = !!m.frozen; myHp = 100;
      $('deathveil').style.opacity = 0;
      showMsg('', 1);
      myId = m.id;
      pos.set(m.spawn[0], m.spawn[1], m.spawn[2]); vel.set(0, 0, 0);
      roundEndsAt = m.roundEndsAt; serverOffset = m.now - Date.now();
      for (const p of m.players) {
        if (p.id !== myId) makeRemote(p);
        else { myColor = p.color; myTeam = p.team || 0; buildMe(); }
      }
      buildMedkits(m.medkits || []);
      buildWeaponSpawns(m.weapons || []);
      snapCamera();
      break;
    case 'pong':
      $('ping').textContent = Math.round(performance.now() - m.ts) + ' ms';
      break;
    case 'medkit':
      if (medkitMeshes[m.i]) medkitMeshes[m.i].visible = false;
      if (m.id === myId) { myHp = m.hp; healFlash(); if (!play('medkit', 0.8)) healSound(); }
      break;
    case 'medkitup':
      if (medkitMeshes[m.i]) medkitMeshes[m.i].visible = true;
      break;
    case 'weapon':
      if (weaponMeshes[m.i]) weaponMeshes[m.i].visible = false;
      if (m.id === myId) {
        myW = m.w; curRange = curW().range; rebuildRing();
        ammo = curW().mag;
        if (!play('medkit', 0.6)) blip(); // reuse pickup sfx — no dedicated weapon-pickup sound yet
      }
      break;
    case 'weaponup':
      if (weaponMeshes[m.i]) weaponMeshes[m.i].visible = true;
      break;
    case 'joined': makeRemote(m.player); feed(`${m.player.name} joined`); break;
    case 'left': { const r = remotes.get(m.id); if (r) feed(`${r.name} left`); removeRemote(m.id); break; }
    case 'states':
      for (const p of m.players) {
        if (p.id === myId) { myHp = p.hp; myKills = p.kills; myDeaths = p.deaths; continue; }
        const r = remotes.get(p.id);
        if (!r) continue;
        setRemoteHp(r, p.hp); r.kills = p.kills; r.deaths = p.deaths;
        if (p.dead !== r.dead) { p.dead ? killRemote(r) : reviveRemote(r); } // missed-event sync
        if (p.dead) continue;
        r.buf.push({ time: m.now, x: p.x, y: p.y, z: p.z, ry: p.ry });
        if (r.buf.length > 20) r.buf.shift();
      }
      break;
    case 'shoot': {
      const r = remotes.get(m.id);
      if (r && m.o && m.d) {
        const o = new THREE.Vector3(...m.o);
        tracer(o, new THREE.Vector3(...m.d));
        // spatialized: volume by distance to ME (not the camera — it hangs 120 away)
        const ear = me ? me.position : camTarget;
        const dist = ear.distanceTo(o);
        const pan = THREE.MathUtils.clamp((o.x - ear.x) / (dist || 1), -1, 1);
        shotSound(Math.min(0.3, 4 / (dist + 2)), pan);
      }
      break;
    }
    case 'chatping': {
      const r = remotes.get(m.id);
      if (r) {
        const tex = new THREE.CanvasTexture(labelCanvas(TAUNTS[m.n] || '...'));
        const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
        s.scale.set(2.4, 0.45, 1); s.position.y = 2.8;
        r.group.add(s);
        setTimeout(() => { r.group.remove(s); s.material.map.dispose(); s.material.dispose(); }, 2000);
        blip();
        feed(`${r.name}: ${TAUNTS[m.n] || '...'}`);
      }
      break;
    }
    case 'hp':
      if (m.id === myId) { myHp = m.hp; flash(); slowUntil = performance.now() + 450; }
      else { const r = remotes.get(m.id); if (r) { setRemoteHp(r, m.hp); flinch(r); } }
      if (m.by === myId) hitmark();
      break;
    case 'die': {
      const killer = m.by === myId ? 'you' : (remotes.get(m.by)?.name || '?');
      const victim = m.id === myId ? 'you' : (remotes.get(m.id)?.name || '?');
      feed(`${killer} ☠ ${victim}`);
      if (m.id === myId) { dead = true; myHp = 0; showMsg('YOU DIED — respawning…', 2000); flash(); $('deathveil').style.opacity = 1; play('death', 0.8); if (me) { me.rotation.x = Math.PI / 2; resetAnim(me.userData.anim); } }
      else {
        const r = remotes.get(m.id);
        if (r) {
          killRemote(r);
          const dist = (me ? me.position : camTarget).distanceTo(r.group.position);
          play('death', Math.min(0.6, 5 / (dist + 2)));
        }
      }
      if (m.by === myId) {
        hitmark();
        const banners = { 3: 'ON FIRE!', 5: 'RAMPAGE!', 7: 'GODLIKE!', 10: 'UNSTOPPABLE!' };
        const voices = { 3: 'onfire', 5: 'rampage', 7: 'godlike', 10: 'unstoppable' };
        if (voices[m.streak]) play(voices[m.streak], 0.9);
        showMsg(banners[m.streak] || 'KILL', 1100);
      }
      break;
    }
    case 'respawn':
      if (m.id === myId) { dead = false; myHp = 100; pos.set(...m.spawn); vel.set(0, 0, 0); $('deathveil').style.opacity = 0; if (me) { me.rotation.x = 0; resetAnim(me.userData.anim); } resetGun(); snapCamera(); }
      else { const r = remotes.get(m.id); if (r) { reviveRemote(r); r.group.position.set(...m.spawn); } }
      break;
    case 'roundend': {
      frozen = true;
      const tk = m.teamKills || [0, 0];
      const hi = Math.max(tk[0], tk[1]), lo = Math.min(tk[0], tk[1]);
      const txt = m.winTeam === -1 || m.winTeam == null
        ? `ROUND OVER — DRAW ${tk[0]}–${tk[1]}`
        : `ROUND OVER — ${teamName(m.winTeam)} WINS ${hi}–${lo}`;
      showMsg(txt, m.breakMs);
      play('roundover', 0.9);
      sb.style.display = 'block'; renderScores();
      break;
    }
    case 'roundstart':
      frozen = false; dead = false; myHp = 100; myKills = 0; myDeaths = 0;
      $('deathveil').style.opacity = 0;
      for (const mk of medkitMeshes) mk.visible = true;
      for (const r of remotes.values()) reviveRemote(r);
      pos.set(...m.spawn); vel.set(0, 0, 0);
      if (me) { me.rotation.x = 0; resetAnim(me.userData.anim); }
      resetGun();
      roundEndsAt = m.roundEndsAt; serverOffset = m.now - Date.now();
      sb.style.display = 'none'; showMsg('ROUND START', 1500);
      play('roundstart', 0.9);
      snapCamera();
      break;
  }
}

  clearTimeout(msgTimer);

}
function feed(text) {

  setTimeout(() => d.remove(), 6000);
}

  clearTimeout(hmT); hmT = setTimeout(() => h.style.opacity = 0, 90);
}
const esc = s => String(s).replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
function renderScores() {
  const rows = [{ name: 'you', team: myTeam, kills: myKills, deaths: myDeaths, me: true },
    ...[...remotes.values()].map(r => ({ name: r.name, team: r.team, kills: r.kills, deaths: r.deaths }))];
  const tk = [0, 0]; for (const r of rows) tk[r.team] += r.kills;
  rows.sort((a, b) => (a.team - b.team) || (b.kills - a.kills));
  const head = `<div style="text-align:center;margin-bottom:10px;font-size:18px;font-weight:bold">` +
    `<span style="color:${TEAM_HUD[0]}">${teamName(0)} ${tk[0]}</span>` +
    `<span style="color:#8a8060"> — </span>` +
    `<span style="color:${TEAM_HUD[1]}">${tk[1]} ${teamName(1)}</span></div>`;
  sb.innerHTML = head + '<table><tr><th>player</th><th>K</th><th>D</th></tr>' +
    rows.map(r => `<tr style="color:${TEAM_HUD[r.team]}${r.me ? ';font-weight:bold' : ''}"><td>${esc(r.name)}${r.me ? ' ◄' : ''}</td><td>${r.kills}</td><td>${r.deaths}</td></tr>`).join('') + '</table>';
}

// ---------- mouse aim (ground-plane raycast — no pointer lock in top-down) ----------
const mouseNDC = new THREE.Vector2(0, 0);
const aimPoint = new THREE.Vector3(0, 0, 0);   // where the cursor points on the ground
let aimTargetPid = 0;                           // enemy under cursor (aim assist)
let aimTargetY = 0;
const cursorRay = new THREE.Raycaster();
const aimPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
addEventListener('mousemove', e => {
  mouseNDC.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  const ch = $('crosshair');
  ch.style.left = e.clientX + 'px';
  ch.style.top = e.clientY + 'px';
});
function updateAim() {
  cursorRay.setFromCamera(mouseNDC, camera);
  // aim assist: if the cursor is over a LIVE ENEMY, lock the shot to them
  aimTargetPid = 0;
  const targets = [];
  for (const r of remotes.values()) if (!r.dead && r.team !== myTeam) targets.push(...r.aimMeshes);
  const hits = cursorRay.intersectObjects(targets, false);
  if (hits[0]) {
    aimTargetPid = hits[0].object.userData.pid;
    const g = remotes.get(aimTargetPid)?.group; // pid → group (legs nest under a pivot now)
    if (g) { aimPoint.set(g.position.x, pos.y, g.position.z); aimTargetY = g.position.y + 1.0; }
  } else {
    aimPlane.constant = -pos.y;     // aim on my own ground level (kills tilt parallax)
    const p = new THREE.Vector3();
    if (cursorRay.ray.intersectPlane(aimPlane, p)) aimPoint.set(p.x, pos.y, p.z);
  }
  // face the cursor
  const dx = aimPoint.x - pos.x, dz = aimPoint.z - pos.z;
  if (dx * dx + dz * dz > 0.04) yaw = Math.atan2(-dx, -dz);
}

// ---------- shooting ----------
let firing = false, lastShot = 0, ammo = 30, reloading = false, reloadT = null, spread = 0, stepT = 0;
let hSpeed = 0, slowUntil = 0, lastBeepSec = -1;
function baseSpread() {
  if (!onGround) return 0.05;
  return hSpeed > 4.5 ? 0.022 : 0.004;
}
addEventListener('mousedown', e => { if (e.button === 0 && ws && $('join').style.display === 'none') firing = true; });
addEventListener('mouseup', e => { if (e.button === 0) firing = false; });
function reload() {
  if (reloading || ammo === curW().mag || dead) return;
  reloading = true;
  $('ammo').textContent = 'RELOADING';
  if (!play('reload', 0.7)) { shotSound(0.05); setTimeout(() => shotSound(0.06), 1300); } // mag out / mag in
  reloadT = setTimeout(() => { ammo = curW().mag; reloading = false; }, 2000);
}
function resetGun() { // death mid-reload must not carry over to the next life; also rolls weapon back to rifle
  clearTimeout(reloadT);
  myW = 0; curRange = WEAPONS[0].range; rebuildRing();
  ammo = WEAPONS[0].mag; reloading = false; firing = false; spread = 0;
}
function tracer(origin, dir, len = curRange) {
  const geo = new THREE.BufferGeometry().setFromPoints([origin, origin.clone().addScaledVector(dir, len)]);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 }));
  scene.add(line);
  setTimeout(() => { scene.remove(line); geo.dispose(); line.material.dispose(); }, 60);
}
// 2D ray-vs-AABB (slab method). Unit dir → returns entry distance, or Infinity if clear.
// Origin sitting inside/at a box returns Infinity so a wall you're already past can't self-block.
function rayRectT(ox, oz, dx, dz, r) {
  let tmin = -Infinity, tmax = Infinity;
  if (Math.abs(dx) < 1e-9) { if (ox < r.minX || ox > r.maxX) return Infinity; }
  else { let t1 = (r.minX - ox) / dx, t2 = (r.maxX - ox) / dx; if (t1 > t2) { const t = t1; t1 = t2; t2 = t; } tmin = Math.max(tmin, t1); tmax = Math.min(tmax, t2); }
  if (Math.abs(dz) < 1e-9) { if (oz < r.minZ || oz > r.maxZ) return Infinity; }
  else { let t1 = (r.minZ - oz) / dz, t2 = (r.maxZ - oz) / dz; if (t1 > t2) { const t = t1; t1 = t2; t2 = t; } tmin = Math.max(tmin, t1); tmax = Math.min(tmax, t2); }
  if (tmax < tmin || tmax < 0) return Infinity;
  return tmin > 0 ? tmin : Infinity;
}
function nearestWallT(ox, oz, dx, dz) {
  let best = Infinity;
  for (const r of shotBlockers) { const t = rayRectT(ox, oz, dx, dz, r); if (t < best) best = t; }
  return best;
}
function shoot(now) {
  if (dead || frozen || reloading || ammo <= 0 || SPECTATE) return;
  if (!ws || ws.readyState !== 1) return;
  if (now - lastShot < curW().fireMs) return;
  lastShot = now; ammo--;
  if (ammo === 0) reload();
  spread = Math.min(Math.max(spread, baseSpread()) + 0.007, 0.05);
  // pure top-down hitscan: everything resolves on the XZ plane, height is irrelevant
  const ox = pos.x, oz = pos.z;
  const ang = yaw + (Math.random() - 0.5) * spread * 2 * curW().spreadMul;
  const nx = -Math.sin(ang), nz = -Math.cos(ang);      // forward unit (matches yaw)
  const wallT = nearestWallT(ox, oz, nx, nz);
  let hitId = 0, fdx = nx, fdz = nz, flen = Math.min(wallT, curRange);

  // aim-assist: cursor locked on an enemy → hit them if in range with clear 2D line of sight
  const lock = aimTargetPid ? remotes.get(aimTargetPid) : null;
  if (lock && !lock.dead && lock.team !== myTeam) {
    const ex = lock.group.position.x - ox, ez = lock.group.position.z - oz;
    const d = Math.hypot(ex, ez);
    if (d > 0.01 && d <= curRange && nearestWallT(ox, oz, ex / d, ez / d) >= d) {
      hitId = aimTargetPid; fdx = ex / d; fdz = ez / d; flen = d;
    }
  }
  // otherwise: nearest enemy whose 2D centre falls within the bullet corridor, before any wall
  if (!hitId) {
    const HIT_R = 0.75, reach = Math.min(wallT, curRange);
    let bestAlong = reach;
    for (const [id, r] of remotes) {
      if (r.dead || r.team === myTeam) continue;
      const ex = r.group.position.x - ox, ez = r.group.position.z - oz;
      const along = ex * nx + ez * nz;
      if (along <= 0 || along > reach) continue;
      if (Math.abs(ex * nz - ez * nx) > HIT_R) continue;  // perpendicular distance to ray
      if (along < bestAlong) { bestAlong = along; hitId = id; }
    }
    if (hitId) flen = bestAlong;
  }

  if (hitId) {
    ws.send(JSON.stringify({ t: 'hit', target: hitId, w: myW })); // w is cosmetic only — server trusts player.w
  } else if (wallT < curRange) {
    const m = new THREE.Mesh(partGeo, new THREE.MeshBasicMaterial({ color: 0xd9c79a }));
    m.position.set(ox + nx * wallT, pos.y + P.chest, oz + nz * wallT); m.scale.setScalar(1.8);
    scene.add(m);
    parts.push({ m, life: 0.18, v: new THREE.Vector3(0, 0.6, 0) });
  }
  const origin = new THREE.Vector3(ox, pos.y + P.chest, oz);
  const flatDir = new THREE.Vector3(fdx, 0, fdz);
  ws.send(JSON.stringify({ t: 'shoot', o: origin.toArray(), d: flatDir.toArray(), w: myW }));
  tracer(origin.clone().addScaledVector(flatDir, 0.9), flatDir, Math.max(0, flen - 0.9));
  shotSound(curW().sndVol, 0, curW().sndRate);
  myMuzzle.visible = true;
  clearTimeout(myMuzzle.userData.t);
  myMuzzle.userData.t = setTimeout(() => myMuzzle.visible = false, 45);
}

// ---------- occlusion fade: keep MY soldier visible behind walls ----------
const occRay = new THREE.Raycaster();
let fadedSet = new Set();
function updateOcclusion() {
  const next = new Set();
  if (me && !SPECTATE) {
    const head = new THREE.Vector3(pos.x, pos.y + 1.4, pos.z);
    const toHead = head.clone().sub(camera.position);
    const dist = toHead.length();
    occRay.set(camera.position, toHead.normalize());
    occRay.far = dist - 0.5;
    for (const h of occRay.intersectObjects(worldMeshes, false)) next.add(h.object);
  }
  for (const m of fadedSet) {
    if (!next.has(m)) { m.material.transparent = false; m.material.opacity = 1; }
  }
  for (const m of next) {
    if (!fadedSet.has(m)) { m.material.transparent = true; m.material.opacity = 0.28; }
  }
  fadedSet = next;
}

// keyboard (registered after all module bindings exist — no TDZ if keys land mid-load)
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'Tab') { e.preventDefault(); sb.style.display = 'block'; }
  if (e.code === 'KeyR') reload();
  if (e.code === 'KeyM') toggleMute();
  if (/^Digit[1-4]$/.test(e.code) && ws && $('join').style.display === 'none') taunt(+e.code[5] - 1);
});
addEventListener('keyup', e => { keys[e.code] = false; if (e.code === 'Tab') sb.style.display = 'none'; });
addEventListener('blur', () => { for (const k in keys) keys[k] = false; firing = false; });

// debug surface for QA tooling (read-only snapshot)
window.__dbg = () => ({
  myId, x: +pos.x.toFixed(1), y: +pos.y.toFixed(1), z: +pos.z.toFixed(1),
  yaw: +yaw.toFixed(2), hp: myHp, dead, ammo,
  aim: { x: +aimPoint.x.toFixed(1), z: +aimPoint.z.toFixed(1), pid: aimTargetPid },
  remotes: [...remotes.entries()].map(([id, r]) => ({
    id, name: r.name, dead: r.dead,
    x: +r.group.position.x.toFixed(1), z: +r.group.position.z.toFixed(1),
  })),
});

// ---------- main loop ----------
let lastT = performance.now(), lastSend = 0;
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  let myMoving = false;

  if (ws && !dead && !frozen && !SPECTATE) {
    // world-aligned WASD (camera never yaws: screen-up IS north)
    const move = new THREE.Vector3();
    if (keys['KeyW']) move.z -= 1;
    if (keys['KeyS']) move.z += 1;
    if (keys['KeyD']) move.x += 1;
    if (keys['KeyA']) move.x -= 1;
    if (move.lengthSq() > 0) move.normalize();
    // tagging: getting hit slows you for 450ms
    const sp = (keys['ShiftLeft'] ? P.walk : P.speed) * (now < slowUntil ? 0.55 : 1);
    hSpeed = move.lengthSq() > 0 ? sp : 0;
    pos.x += move.x * sp * dt;
    pos.z += move.z * sp * dt;
    if (keys['Space'] && onGround) { vel.y = P.jump; onGround = false; }
    vel.y -= P.grav * dt;
    pos.y += vel.y * dt;
    onGround = false;
    collide();
    pos.x = Math.max(-72.5, Math.min(72.5, pos.x));
    pos.z = Math.max(-72.5, Math.min(72.5, pos.z));
    updateAim();
    if (firing) shoot(now); else spread = Math.max(baseSpread(), spread - 0.12 * dt);
    myMoving = move.lengthSq() > 0 && onGround;
    if (myMoving) { stepT += dt; if (stepT > 0.37) { stepT = 0; if (!play('step', 0.08, 0, 0.85 + Math.random() * 0.3)) shotSound(0.018); } } else stepT = 0;
  }
  updateParts(dt);
  for (const mk of medkitMeshes) {
    if (!mk.visible) continue;
    mk.rotation.y += dt * 1.6;
    mk.position.y = mk.userData.baseY + 0.12 + Math.sin(now * 0.0035) * 0.1;
  }
  for (const wm of weaponMeshes) {
    if (!wm.visible) continue;
    wm.rotation.y += dt * 1.6;
    wm.position.y = wm.userData.baseY + 0.12 + Math.sin(now * 0.0035) * 0.1;
  }

  // own avatar + aim widgets
  if (me) {
    me.position.set(pos.x, pos.y + (dead ? 0.2 : 0), pos.z); // lift corpse out of the floor
    if (!dead) me.rotation.y = yaw;
    animateWalk(me.userData.anim, dt, myMoving && !dead);
    ring.position.set(pos.x, pos.y + 0.06, pos.z);
    ring.visible = !dead && !SPECTATE;
    const from = new THREE.Vector3(pos.x, pos.y + 1.1, pos.z);
    const to = new THREE.Vector3(aimPoint.x, pos.y + 1.1, aimPoint.z);
    const d = to.clone().sub(from);
    if (d.length() > curRange) to.copy(from).addScaledVector(d.normalize(), curRange);
    aimGeo.setFromPoints([from, to]);
    aimLine.material.opacity = firing ? 0.7 : 0.3;
    aimLine.visible = !dead && !SPECTATE;
  }

  // camera: smooth follow + cursor look-ahead (Brawl-Stars feel); stays on the corpse while dead
  if (!SPECTATE) {
    const ahead = dead ? new THREE.Vector3()
      : new THREE.Vector3(aimPoint.x - pos.x, 0, aimPoint.z - pos.z).multiplyScalar(CAM.lookAhead);
    if (ahead.length() > CAM.lookMax) ahead.setLength(CAM.lookMax);
    const want = new THREE.Vector3(pos.x + ahead.x, pos.y, pos.z + ahead.z);
    camTarget.lerp(want, 1 - Math.exp(-CAM.lerp * dt));
    camera.position.set(camTarget.x, camTarget.y + camOffY, camTarget.z + camOffZ);
    camera.lookAt(camTarget);
  }
  updateOcclusion();

  // interpolate remotes (render 120ms in the past)
  const renderTime = Date.now() + serverOffset - 120;
  for (const r of remotes.values()) {
    if (r.dead) { // fall over and lie until respawn
      if (r.fall < 1) {
        r.fall = Math.min(1, r.fall + dt * 2.4);
        const e = 1 - Math.pow(1 - r.fall, 3);
        r.group.rotation.x = e * Math.PI / 2 * 0.97;
        r.group.position.y = e * 0.2;
      }
      continue;
    }
    const prevX = r.group.position.x, prevZ = r.group.position.z;
    const b = r.buf;
    while (b.length > 2 && b[1].time <= renderTime) b.shift();
    if (b.length >= 2) {
      const [a, c] = b;
      const t = Math.max(0, Math.min(1, (renderTime - a.time) / Math.max(1, c.time - a.time)));
      r.group.position.set(a.x + (c.x - a.x) * t, a.y + (c.y - a.y) * t, a.z + (c.z - a.z) * t);
      let dyaw = c.ry - a.ry; // shortest-arc lerp: no 360 spins across the ±PI seam
      dyaw = ((dyaw + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
      r.group.rotation.y = a.ry + dyaw * t;
    } else if (b.length === 1) {
      r.group.position.set(b[0].x, b[0].y, b[0].z);
      r.group.rotation.y = b[0].ry;
    }
    // drive the walk cycle from how far the remote actually slid this frame
    const moved = Math.hypot(r.group.position.x - prevX, r.group.position.z - prevZ);
    animateWalk(r.group.userData.anim, dt, moved > 0.012);
  }

  // net send 20Hz
  if (ws && ws.readyState === 1 && now - lastSend > 50) {
    lastSend = now;
    ws.send(JSON.stringify({ t: 'state', x: +pos.x.toFixed(2), y: +pos.y.toFixed(2), z: +pos.z.toFixed(2), ry: +yaw.toFixed(3), rx: 0 }));
  }

  // HUD
  $('hp').textContent = '+' + Math.max(0, myHp);
  $('hp').style.color = hpColor(myHp);
  if (!reloading) $('ammo').textContent = `${curW().name} ${ammo}/∞`;
  $('crosshair').style.fontSize = Math.round(16 + spread * 500) + 'px'; // dynamic: shows your accuracy
  const left = Math.max(0, roundEndsAt - (Date.now() + serverOffset));
  const tk = [0, 0]; tk[myTeam] += myKills; for (const r of remotes.values()) tk[r.team] += r.kills;
  const time = `${Math.floor(left / 60000)}:${String(Math.floor(left % 60000 / 1000)).padStart(2, '0')}`;
  const timeCol = left <= 15000 && !frozen ? '#ff5544' : '#e8e0c8';
  $('timer').innerHTML = `<span style="color:${TEAM_HUD[0]}">${tk[0]}</span>` +
    `&nbsp;&nbsp;<span style="color:${timeCol}">${time}</span>&nbsp;&nbsp;` +
    `<span style="color:${TEAM_HUD[1]}">${tk[1]}</span>`;
  if (ws && !frozen && left > 0 && left <= 10000) {
    const s = Math.floor(left / 1000);
    if (s !== lastBeepSec) { lastBeepSec = s; blip(); }
  }
  if (sb.style.display === 'block') renderScores();

  renderer.render(scene, camera);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
